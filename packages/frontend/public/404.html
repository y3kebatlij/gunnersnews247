<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Arsenal News</title>
  <script>
    var l = window.location;
    var path = l.pathname + l.search + l.hash;
    // Only redirect if not already at root to prevent loops
    if (path !== '/' && path !== '') {
      sessionStorage.setItem('redirect', path);
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    }
  </script>
</head>
</html>

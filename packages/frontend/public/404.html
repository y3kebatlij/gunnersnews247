<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Arsenal News</title>
  <script>
    var l = window.location;
    var path = l.pathname;
    var base = '/gunnersnews247';
    if (path !== base + '/' && path.indexOf('/?') === -1) {
      sessionStorage.setItem('redirect', path + l.search + l.hash);
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + base + '/');
    }
  </script>
</head>
</html>
